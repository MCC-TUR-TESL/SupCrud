<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./estilos.css" />
    <title>Document</title>
    <!--boostrap-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!--boostrap icons-->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  </head>

  <body>
    <!--ASIDE & MAIN-->
    <div class="container-fluid">
      <div class="row vh-100">
        <!--ASIDE-->
        <div class="col col-lg-3 align-content-center">
          <div class="card h-100 w-100 bg-dark p-5">
            <h2
              class="text-warning text-sm-center mt-5"
              data-translate="navigation"
            >
              Navigation
            </h2>
            <ul class="nav d-flex flex-column">
              <a
                class="manage-pqrs nav-link text-warning"
                href="#"
                data-translate="file-manager"
                ><i class="bi bi-file-earmark-post-fill"></i> Manage PQRS</a>
                <a
                class="manage-staff nav-link text-warning"
                href="#"
                data-translate="file-manager"
                ><i class="bi bi-people"></i> Manage Staff</a>
            </ul>
            <div class="d-flex align-items-end h-100">
              <div class="d-flex align-items-center text-warning">
                <div id="userAvatar" class="user-avatar"></div>
                <div class="user-info ms-2">
                  <div id="userName" class="user-name"></div>
                  <div id="userEmail" class="user-email small text-white"></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!--MAIN-->
        <div class="col col-lg-9">
          <!--Navbar-->
          <div class="row">
            <div class="col col-lg-12">
              <div
                class="card d-flex flex-row justify-content-around bg-dark w-100"
                id="navbar"
              >
                <div class="">
                  <h1 class="text-warning">ToolStore</h1>
                </div>

                <form class="form">
                  <button>
                    <svg
                      width="17"
                      height="16"
                      fill="none"
                      xmlns="http://www.w3.org/2000/svg"
                      role="img"
                      aria-labelledby="search"
                    >
                      <path
                        d="M7.667 12.667A5.333 5.333 0 107.667 2a5.333 5.333 0 000 10.667zM14.334 14l-2.9-2.9"
                        stroke="currentColor"
                        stroke-width="1.333"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      ></path>
                    </svg>
                  </button>

                  <input
                    class="input"
                    placeholder="Quick Search..."
                    required=""
                    type="text"
                  />
                  <button class="reset" type="reset">
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      class="h-6 w-6"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M6 18L18 6M6 6l12 12"
                      ></path>
                    </svg>
                  </button>
                </form>

                <div class="iconos-opciones">
                  <div class="brightness-container">
                    <a href="#" id="brightness-icon">
                      <img src="./assets/img/brillo.png" alt="" />
                    </a>
                    <div class="brightness-slider" id="brightness-ctrl">
                      <input
                        type="range"
                        id="brightness-range"
                        min="10"
                        max="100"
                        value="100"
                      />
                    </div>
                  </div>
                  <a href="#" class="geneva admin-name"
                    ><i class="bi bi-person"></i> ADMIN</a
                  >
                </div>
              </div>
            </div>
          </div>

          <div class="card p-5 mt-3">
            <!-- MAIN -->
            <main class="main">
              <!-- CARDS -->

              <!-- TABLE -->
            </main>
          </div>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/admin.script.js" type="module"></script>

    <!--Sweet Alert-->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </body>
</html>
